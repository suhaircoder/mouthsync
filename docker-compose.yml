# MouthSync: UI :3000 → gateway :8000 → WORKER_URL (RunPod or local worker).
# Set WORKER_URL in .env. Local worker: WORKER_URL=http://worker:8000 and
#   docker compose --profile local-worker up --build
# Vite proxies /api to the gateway service.

services:
  worker:
    profiles: ["local-worker"]
    build: ./runpod-worker
    ports:
      - "9000:8000"
    environment:
      WORKER_API_KEY: ${WORKER_API_KEY:-}

  # SadTalker (GPU): docker compose --profile sadtalker-worker up worker-sadtalker
  worker-sadtalker:
    profiles: ["sadtalker-worker"]
    build: ./runpod-worker-sadtalker
    ports:
      - "9001:8000"
    environment:
      WORKER_API_KEY: ${WORKER_API_KEY:-}
      SADTALKER_SIZE: ${SADTALKER_SIZE:-256}
      SADTALKER_PRELOAD: ${SADTALKER_PRELOAD:-1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    volumes:
      - ./gateway/data:/app/data
    environment:
      # Optional default from .env; otherwise URL is set in UI (browser localStorage)
      WORKER_URL: ${WORKER_URL:-}
      WORKER_API_KEY: ${WORKER_API_KEY:-}
      WORKER_TIMEOUT_SEC: ${WORKER_TIMEOUT_SEC:-600}

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      PROXY_API_TARGET: http://gateway:8000
    depends_on:
      - gateway

volumes:
  frontend_node_modules:
